<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ECG Medical Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="icon" type="image/png" href="logo.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        ecgBlue: '#0b3b60',
                        ecgYellow: '#f3b204',
                        ecgBlueDark: '#07243c',
                    },
                    boxShadow: {
                        'premium': '0 10px 40px -10px rgba(11,59,96,0.2)',
                        'premium-hover': '0 20px 40px -10px rgba(11,59,96,0.3)',
                    }
                }
            }
        }
    </script>
    <style>
        .view-hidden {
            display: none !important;
        }

        .fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }

        .slide-up {
            animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .input-premium {
            transition: all 0.2s ease-in-out;
        }

        .input-premium:focus {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(11, 59, 96, 0.1);
        }

        @keyframes float-slow {
            0% {
                transform: translate(0, 0) rotate(0deg);
            }

            33% {
                transform: translate(10px, -15px) rotate(2deg);
            }

            66% {
                transform: translate(-5px, -25px) rotate(-2deg);
            }

            100% {
                transform: translate(0, 0) rotate(0deg);
            }
        }

        .floating-icon {
            animation: float-slow 8s ease-in-out infinite;
            opacity: 0.15;
            z-index: 0;
            pointer-events: none;
        }

        .icon-delay-1 {
            animation-delay: -1s;
            animation-duration: 10s;
        }

        .icon-delay-2 {
            animation-delay: -3s;
            animation-duration: 12s;
        }

        .icon-delay-3 {
            animation-delay: -5s;
            animation-duration: 9s;
        }

        .icon-delay-4 {
            animation-delay: -7s;
            animation-duration: 11s;
        }
    </style>
</head>

<body id="page-auth"
    class="bg-gradient-to-br from-ecgBlue to-ecgBlueDark text-gray-800 min-h-screen flex flex-col font-sans antialiased relative">
    <!-- Premium auth background decoration -->
    <div class="fixed inset-0 -z-10 overflow-hidden pointer-events-none">
        <div class="absolute -top-[20%] -left-[10%] w-[60%] h-[60%] rounded-full bg-white/[0.03] blur-[150px]"></div>
        <div class="absolute bottom-[10%] -right-[10%] w-[50%] h-[50%] rounded-full bg-ecgYellow/[0.05] blur-[140px]">
        </div>
        <div class="absolute top-[40%] left-[30%] w-[40%] h-[40%] rounded-full bg-blue-400/[0.02] blur-[120px]"></div>
    </div>
    <main class="flex-grow w-full relative overflow-hidden">
        <!-- Abstract Background Ornaments -->
        <div class="absolute top-0 left-0 w-full h-full overflow-hidden -z-10 pointer-events-none">
            <div class="absolute -top-[20%] -right-[10%] w-[50%] h-[50%] rounded-full bg-blue-100/40 blur-3xl"></div>
            <div class="absolute -bottom-[20%] -left-[10%] w-[50%] h-[50%] rounded-full bg-yellow-100/40 blur-3xl">
            </div>

            <!-- Floating Medical Icons -->
            <div class="floating-icon icon-delay-1 absolute top-[15%] left-[10%] text-ecgBlue">
                <svg class="w-20 h-20" fill="currentColor" viewBox="0 0 24 24">
                    <path
                        d="M19 3H5c-1.103 0-2 .897-2 2v14c0 1.103.897 2 2 2h14c1.103 0 2-.897 2-2V5c0-1.103-.897-2-2-2zM9 11V7h2v4h4v2h-4v4H9v-4H5v-2h4z" />
                </svg>
            </div>
            <div class="floating-icon icon-delay-2 absolute top-[60%] right-[15%] text-ecgBlue">
                <svg class="w-16 h-16" fill="currentColor" viewBox="0 0 24 24">
                    <path
                        d="M12 2C6.486 2 2 6.486 2 12s4.486 10 10 10 10-4.486 10-10S17.514 2 12 2zm0 18c-4.411 0-8-3.589-8-8s3.589-8 8-8 8 3.589 8 8-3.589 8-8 8z" />
                    <path d="M11 11H9v2h2v2h2v-2h2v-2h-2V9h-2v2z" />
                </svg>
            </div>
            <div class="floating-icon icon-delay-3 absolute bottom-[15%] left-[20%] text-ecgYellow">
                <svg class="w-24 h-24" fill="currentColor" viewBox="0 0 24 24">
                    <path
                        d="M19.649 10.232l-3.328-3.328-2.603 2.603 3.328 3.328zM15.462 8.04l-3.328-3.328-2.603 2.603 3.328 3.328zM11.275 5.849l-3.328-3.328-2.603 2.603 3.328 3.328zM18.841 21.159c-.391.391-1.024.391-1.414 0l-3.536-3.536 1.414-1.414 3.536 3.536c.391.391.391 1.024 0 1.414zM12.477 14.795L11.063 13.38l-4.242 4.242 1.414 1.414zM9.649 11.967l-1.414-1.414-4.242 4.242 1.414 1.414z" />
                </svg>
            </div>
            <div class="floating-icon icon-delay-4 absolute top-[40%] left-[40%] text-ecgBlue/20">
                <svg class="w-32 h-32" fill="currentColor" viewBox="0 0 24 24">
                    <path
                        d="M12 2C6.486 2 2 6.486 2 12s4.486 10 10 10 10-4.486 10-10S17.514 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z" />
                </svg>
            </div>
            <div class="floating-icon icon-delay-1 absolute top-[10%] right-[30%] text-ecgYellow/30">
                <svg class="w-14 h-14" fill="currentColor" viewBox="0 0 24 24">
                    <path
                        d="M20 6h-4V4c0-1.103-.897-2-2-2h-4c-1.103 0-2 .897-2 2v2H4c-1.103 0-2 .897-2 2v12c0 1.103.897 2 2 2h16c1.103 0 2-.897 2-2V8c0-1.103-.897-2-2-2zM10 4h4v2h-4V4zm10 16H4V8h16v12z" />
                    <path d="M13 10h-2v2H9v2h2v2h2v-2h2v-2h-2z" />
                </svg>
            </div>
        </div>

        <div class="min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
            <div
                class="max-w-md w-full bg-white/80 backdrop-blur-xl rounded-2xl shadow-premium border border-white/50 overflow-hidden slide-up">
                <div class="bg-gradient-to-r from-ecgBlue to-ecgBlueDark py-8 text-center relative overflow-hidden">
                    <div
                        class="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] opacity-10">
                    </div>
                    <div
                        class="relative z-10 w-48 h-16 mx-auto bg-white rounded-xl shadow-lg flex items-center justify-center mb-4 transform -rotate-1 hover:rotate-0 transition-all duration-300 p-2">
                        <img src="logo.png" alt="ECG Logo" class="max-h-full max-w-full object-contain">
                    </div>
                    <h2 class="text-3xl font-extrabold text-white font-display tracking-tight">ECG Staff</h2>
                    <p class="text-ecgYellow mt-1 font-medium tracking-wide">Medical Services Portal</p>
                </div>

                <div class="p-8">
                    <!-- Login Form -->
                    <form id="login-form" class="space-y-6 slide-up" onsubmit="handleLogin(event)">
                        <div class="text-center mb-6">
                            <h3 class="text-2xl font-bold text-gray-900 font-display">Welcome Back</h3>
                            <p class="text-sm text-gray-500 mt-1">Please sign in to your account</p>
                        </div>

                        <div id="login-error"
                            class="hidden bg-red-50 border-l-4 border-red-500 text-red-700 p-4 rounded-md text-sm mb-4">
                        </div>

                        <div class="space-y-5">
                            <div>
                                <label class="block text-sm font-semibold text-gray-700 mb-1">Staff ID</label>
                                <div class="relative">
                                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                        <svg class="h-5 w-5 text-gray-400" fill="none" viewBox="0 0 24 24"
                                            stroke="currentColor">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                                d="M10 6H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V8a2 2 0 00-2-2h-5m-4 0V5a2 2 0 114 0v1m-4 0a2 2 0 104 0m-5 8a2 2 0 100-4 2 2 0 000 4zm0 0c1.306 0 2.417.835 2.83 2M9 14a3.001 3.001 0 00-2.83 2M15 11h3m-3 4h2" />
                                        </svg>
                                    </div>
                                    <input type="text" id="login-id" required
                                        class="input-premium pl-10 block w-full bg-gray-50 border border-gray-200 rounded-xl shadow-sm py-3 px-4 focus:bg-white focus:outline-none focus:ring-2 focus:ring-ecgBlue/50 focus:border-ecgBlue sm:text-sm transition-colors">
                                </div>
                            </div>
                            <div>
                                <label class="block text-sm font-semibold text-gray-700 mb-1">Password</label>
                                <div class="relative">
                                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                        <svg class="h-5 w-5 text-gray-400" fill="none" viewBox="0 0 24 24"
                                            stroke="currentColor">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                                d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                                        </svg>
                                    </div>
                                    <input type="password" id="login-pwd" required
                                        class="input-premium pl-10 block w-full bg-gray-50 border border-gray-200 rounded-xl shadow-sm py-3 px-4 focus:bg-white focus:outline-none focus:ring-2 focus:ring-ecgBlue/50 focus:border-ecgBlue sm:text-sm transition-colors">
                                </div>
                                <div class="flex justify-end mt-2">
                                    <button type="button" onclick="toggleAuthForm('forgot')"
                                        class="text-xs font-semibold text-ecgBlue hover:text-blue-800 transition">Forgot
                                        Password?</button>
                                </div>
                            </div>
                        </div>

                        <button type="submit"
                            class="w-full flex justify-center py-3 px-4 border border-transparent rounded-xl shadow-md text-sm font-bold text-white bg-ecgBlue hover:bg-ecgBlueDark hover:shadow-lg hover:-translate-y-0.5 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-ecgBlue transition-all duration-200">
                            Sign In
                        </button>

                        <div class="mt-6 border-t border-gray-100 pt-6 flex items-center justify-center">
                            <span class="text-sm border-gray-200 bg-white px-2 text-gray-500">Don't have an account?
                            </span>
                            <button type="button" onclick="toggleAuthForm('signup')"
                                class="text-sm font-semibold text-ecgBlue hover:text-blue-800 transition ml-1">Register
                                Now</button>
                        </div>
                    </form>

                    <!-- Signup Form -->
                    <form id="signup-form" class="space-y-5 view-hidden slide-up" onsubmit="handleSignup(event)">
                        <div class="text-center mb-6">
                            <h3 class="text-2xl font-bold text-gray-900 font-display">Staff Registration</h3>
                            <p class="text-sm text-gray-500 mt-1">Create your secure portal account</p>
                        </div>

                        <div id="signup-error"
                            class="hidden bg-red-50 border-l-4 border-red-500 text-red-700 p-4 rounded-md text-sm mb-4">
                        </div>

                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-1">Full Name</label>
                            <input type="text" id="reg-name" required
                                class="input-premium block w-full bg-gray-50 border border-gray-200 rounded-xl shadow-sm py-2.5 px-4 focus:bg-white focus:outline-none focus:ring-2 focus:ring-ecgBlue/50 focus:border-ecgBlue sm:text-sm transition-colors">
                        </div>
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-semibold text-gray-700 mb-1">Staff ID</label>
                                <input type="text" id="reg-staffId" required
                                    class="input-premium block w-full bg-gray-50 border border-gray-200 rounded-xl shadow-sm py-2.5 px-4 focus:bg-white focus:outline-none focus:ring-2 focus:ring-ecgBlue/50 focus:border-ecgBlue sm:text-sm transition-colors">
                            </div>
                            <div>
                                <label class="block text-sm font-semibold text-gray-700 mb-1">Department</label>
                                <select id="reg-dept" required
                                    class="input-premium block w-full bg-gray-50 border border-gray-200 rounded-xl shadow-sm py-2.5 px-4 focus:bg-white focus:outline-none focus:ring-2 focus:ring-ecgBlue/50 focus:border-ecgBlue sm:text-sm transition-colors text-gray-700">
                                    <option value="">Select Dept</option>
                                    <option value="IT">IT</option>
                                    <option value="HR">HR</option>
                                    <option value="Engineering">Engineering</option>
                                    <option value="Finance">Finance</option>
                                </select>
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-1">Email <span
                                    class="font-normal text-gray-500">(ECG Domain)</span></label>
                            <input type="email" id="reg-email" required placeholder="name@ecg.com.gh"
                                class="input-premium block w-full bg-gray-50 border border-gray-200 rounded-xl shadow-sm py-2.5 px-4 focus:bg-white focus:outline-none focus:ring-2 focus:ring-ecgBlue/50 focus:border-ecgBlue sm:text-sm transition-colors">
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 mb-1">Phone Number</label>
                            <input type="tel" id="reg-phone" required
                                class="input-premium block w-full bg-gray-50 border border-gray-200 rounded-xl shadow-sm py-2.5 px-4 focus:bg-white focus:outline-none focus:ring-2 focus:ring-ecgBlue/50 focus:border-ecgBlue sm:text-sm transition-colors">
                        </div>
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-semibold text-gray-700 mb-1">Password</label>
                                <input type="password" id="reg-pwd" required minlength="8" placeholder="Min 8 chars"
                                    class="input-premium block w-full bg-gray-50 border border-gray-200 rounded-xl shadow-sm py-2.5 px-4 focus:bg-white focus:outline-none focus:ring-2 focus:ring-ecgBlue/50 focus:border-ecgBlue sm:text-sm transition-colors">
                            </div>
                            <div>
                                <label class="block text-sm font-semibold text-gray-700 mb-1">Confirm</label>
                                <input type="password" id="reg-confirm" required placeholder="Retype password"
                                    class="input-premium block w-full bg-gray-50 border border-gray-200 rounded-xl shadow-sm py-2.5 px-4 focus:bg-white focus:outline-none focus:ring-2 focus:ring-ecgBlue/50 focus:border-ecgBlue sm:text-sm transition-colors">
                            </div>
                        </div>
                        <button type="submit"
                            class="w-full flex justify-center py-3 px-4 mt-2 border border-transparent rounded-xl shadow-md text-sm font-bold text-white bg-ecgYellow hover:bg-yellow-500 hover:shadow-lg hover:-translate-y-0.5 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-yellow-400 text-gray-900 transition-all duration-200">
                            Create Account
                        </button>

                        <div class="mt-6 border-t border-gray-100 pt-6 flex items-center justify-center">
                            <span class="text-sm border-gray-200 bg-white px-2 text-gray-500">Already have an account?
                            </span>
                            <button type="button" onclick="toggleAuthForm('login')"
                                class="text-sm font-semibold text-ecgBlue hover:text-blue-800 transition ml-1">Sign
                                In</button>
                        </div>
                    </form>

                    <!-- Forgot Password Form -->
                    <form id="forgot-form" class="space-y-6 view-hidden slide-up"
                        onsubmit="handleForgotPassword(event)">
                        <div class="text-center mb-6">
                            <h3 class="text-2xl font-bold text-gray-900 font-display">Reset Password</h3>
                            <p class="text-sm text-gray-500 mt-1">Verify your identity to continue</p>
                        </div>

                        <div id="forgot-error"
                            class="hidden bg-red-50 border-l-4 border-red-500 text-red-700 p-4 rounded-md text-sm mb-4">
                        </div>
                        <div id="forgot-success"
                            class="hidden bg-green-50 border-l-4 border-green-500 text-green-700 p-4 rounded-md text-sm mb-4">
                        </div>

                        <div class="space-y-5">
                            <div>
                                <label class="block text-sm font-semibold text-gray-700 mb-1">Staff ID</label>
                                <input type="text" id="forgot-id" required placeholder="E.g. ECG-12345"
                                    class="input-premium block w-full bg-gray-50 border border-gray-200 rounded-xl shadow-sm py-3 px-4 focus:bg-white focus:outline-none focus:ring-2 focus:ring-ecgBlue/50 focus:border-ecgBlue sm:text-sm transition-colors">
                            </div>
                            <div>
                                <label class="block text-sm font-semibold text-gray-700 mb-1">Official Email</label>
                                <input type="email" id="forgot-email" required placeholder="name@ecg.com.gh"
                                    class="input-premium block w-full bg-gray-50 border border-gray-200 rounded-xl shadow-sm py-3 px-4 focus:bg-white focus:outline-none focus:ring-2 focus:ring-ecgBlue/50 focus:border-ecgBlue sm:text-sm transition-colors">
                            </div>
                        </div>

                        <button type="submit"
                            class="w-full flex justify-center py-3 px-4 border border-transparent rounded-xl shadow-md text-sm font-bold text-white bg-ecgBlue hover:bg-ecgBlueDark transition-all duration-200">
                            Verify Identity
                        </button>

                        <div class="pt-4 text-center">
                            <button type="button" onclick="toggleAuthForm('login')"
                                class="text-sm font-semibold text-gray-500 hover:text-ecgBlue transition flex items-center justify-center mx-auto">
                                <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                                </svg>
                                Back to Sign In
                            </button>
                        </div>
                    </form>

                    <!-- New Password Form -->
                    <form id="reset-form" class="space-y-6 view-hidden slide-up" onsubmit="handleResetPassword(event)">
                        <div class="text-center mb-6">
                            <h3 class="text-2xl font-bold text-gray-900 font-display">New Password</h3>
                            <p class="text-sm text-gray-500 mt-1">Choose a strong, secure password</p>
                        </div>

                        <div id="reset-error"
                            class="hidden bg-red-50 border-l-4 border-red-500 text-red-700 p-4 rounded-md text-sm mb-4">
                        </div>

                        <div class="space-y-5">
                            <div>
                                <label class="block text-sm font-semibold text-gray-700 mb-1">New Password</label>
                                <input type="password" id="new-pwd" required minlength="8"
                                    class="input-premium block w-full bg-gray-50 border border-gray-200 rounded-xl shadow-sm py-3 px-4 focus:bg-white focus:outline-none focus:ring-2 focus:ring-ecgBlue/50 focus:border-ecgBlue sm:text-sm transition-colors">
                            </div>
                            <div>
                                <label class="block text-sm font-semibold text-gray-700 mb-1">Confirm New
                                    Password</label>
                                <input type="password" id="confirm-new-pwd" required
                                    class="input-premium block w-full bg-gray-50 border border-gray-200 rounded-xl shadow-sm py-3 px-4 focus:bg-white focus:outline-none focus:ring-2 focus:ring-ecgBlue/50 focus:border-ecgBlue sm:text-sm transition-colors">
                            </div>
                        </div>

                        <button type="submit"
                            class="w-full flex justify-center py-3 px-4 border border-transparent rounded-xl shadow-md text-sm font-bold text-white bg-ecgYellow hover:bg-yellow-500 text-gray-900 transition-all duration-200">
                            Update Password
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </main>
    <script src="app.js"></script>
</body>

</html>
