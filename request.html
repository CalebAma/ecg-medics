<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request Medical Attention - ECG Medical Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="icon" type="image/png" href="logo.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        ecgBlue: '#2E3192',
                        ecgYellow: '#f3b204',
                        ecgBlueDark: '#1a1d6e',
                    },
                    boxShadow: {
                        'premium': '0 10px 40px -10px rgba(46,49,146,0.1)',
                        'premium-hover': '0 20px 40px -10px rgba(46,49,146,0.2)',
                    }
                }
            }
        }
    </script>
    <style>
        .view-hidden {
            display: none !important;
        }

        .fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }

        .slide-up {
            animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .input-premium {
            transition: all 0.2s ease-in-out;
        }

        .input-premium:focus {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(46, 49, 146, 0.1);
        }

        .skeleton {
            background: linear-gradient(90deg, #f0f4f8 25%, #e2e8f0 50%, #f0f4f8 75%);
            background-size: 200% 100%;
            animation: shimmer 1.4s infinite;
            border-radius: 6px;
        }

        @keyframes shimmer {
            0% {
                background-position: 200% 0;
            }

            100% {
                background-position: -200% 0;
            }
        }
    </style>
</head>

<body id="page-request" class="bg-[#f8fafc] text-gray-800 min-h-screen flex flex-col font-sans antialiased relative">
    <!-- Premium background decoration -->
    <div class="fixed inset-0 -z-10 overflow-hidden pointer-events-none">
        <div class="absolute top-1/4 -right-10 w-[40%] h-[40%] rounded-full bg-ecgBlue/[0.03] blur-[120px]"></div>
        <div class="absolute bottom-1/4 -left-10 w-[35%] h-[35%] rounded-full bg-ecgYellow/[0.04] blur-[110px]"></div>
    </div>
    <!-- Navbar -->
    <nav class="bg-gradient-to-r from-ecgBlue to-ecgBlueDark text-white shadow-lg sticky top-0 z-50 border-b border-white/10"
        id="app-navbar">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex-shrink-0 flex items-center cursor-pointer"
                    onclick="window.location.href='dashboard.html'">
                    <img src="logo.png" alt="ECG Logo"
                        class="h-10 w-auto object-contain bg-white/20 p-1 rounded backdrop-blur-sm border border-white/10">
                    <span class="ml-3 font-bold text-lg text-white tracking-tight">ECG Medical Portal</span>
                </div>
                <!-- Desktop Menu -->
                <div class="hidden md:ml-6 md:flex md:space-x-8 items-center">
                    <a href="dashboard.html"
                        class="hover:text-ecgYellow px-3 py-2 rounded-md text-sm font-medium transition">Dashboard</a>
                    <a href="request.html"
                        class="text-ecgYellow px-3 py-2 rounded-md text-sm font-medium transition">Request Medical</a>
                    <a href="history.html"
                        class="hover:text-ecgYellow px-3 py-2 rounded-md text-sm font-medium transition">History</a>
                    <div class="border-l border-blue-700 h-6 mx-2"></div>
                    <div id="nav-user-info"></div>
                </div>
                <!-- Mobile menu button -->
                <div class="flex items-center md:hidden">
                    <button onclick="toggleMobileMenu()"
                        class="inline-flex items-center justify-center p-2 rounded-md hover:text-ecgYellow hover:bg-blue-800 focus:outline-none transition">
                        <svg class="h-6 w-6" stroke="currentColor" fill="none" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M4 6h16M4 12h16M4 18h16" />
                        </svg>
                    </button>
                </div>
            </div>
        </div>
        <!-- Mobile Menu Panel -->
        <div class="md:hidden hidden bg-blue-900 pb-3 pt-2" id="mobile-menu">
            <a href="dashboard.html"
                class="block w-full text-left px-4 py-2 text-base font-medium text-white hover:bg-blue-800 hover:text-ecgYellow">Dashboard</a>
            <a href="request.html"
                class="block w-full text-left px-4 py-2 text-base font-medium text-ecgYellow hover:bg-blue-800">Request
                Medical</a>
            <a href="history.html"
                class="block w-full text-left px-4 py-2 text-base font-medium text-white hover:bg-blue-800 hover:text-ecgYellow">History</a>
            <button onclick="logoutUser()"
                class="block w-full text-left px-4 py-2 text-base font-medium text-red-300 hover:bg-blue-800 hover:text-red-400">Logout</button>
        </div>
    </nav>

    <div class="flex flex-1">
        <!-- Sidebar -->
        <aside
            class="hidden md:flex flex-col w-64 bg-white border-r border-gray-200 sticky top-16 h-[calc(100vh-4rem)]">
            <nav class="flex-1 px-4 py-6 space-y-2 overflow-y-auto">
                <a href="dashboard.html"
                    class="text-gray-600 hover:bg-gray-50 hover:text-ecgBlue group flex items-center px-3 py-2.5 text-sm font-medium rounded-xl transition-all">
                    <svg class="mr-3 h-5 w-5 text-gray-400 group-hover:text-ecgBlue" fill="none" stroke="currentColor"
                        viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6">
                        </path>
                    </svg>
                    Dashboard
                </a>
                <a href="request.html"
                    class="bg-blue-50 text-ecgBlue group flex items-center px-3 py-2.5 text-sm font-bold rounded-xl border border-blue-100 transition-all shadow-sm">
                    <svg class="mr-3 h-5 w-5 text-ecgBlue" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01">
                        </path>
                    </svg>
                    Medical Requests
                </a>
                <a href="history.html"
                    class="text-gray-600 hover:bg-gray-50 hover:text-ecgBlue group flex items-center px-3 py-2.5 text-sm font-medium rounded-xl transition-all">
                    <svg class="mr-3 h-5 w-5 text-gray-400 group-hover:text-ecgBlue" fill="none" stroke="currentColor"
                        viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                    History
                </a>
                <a href="profile.html"
                    class="text-gray-600 hover:bg-gray-50 hover:text-ecgBlue group flex items-center px-3 py-2.5 text-sm font-medium rounded-xl transition-all">
                    <svg class="mr-3 h-5 w-5 text-gray-400 group-hover:text-ecgBlue" fill="none" stroke="currentColor"
                        viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                    </svg>
                    Profile
                </a>
            </nav>
            <div class="p-4 border-t border-gray-100">
                <button onclick="logoutUser()"
                    class="w-full flex items-center px-3 py-3 text-sm font-bold text-red-600 hover:bg-red-50 rounded-xl transition-all group">
                    <svg class="mr-3 h-5 w-5 text-red-500 group-hover:scale-110 transition-transform" fill="none"
                        stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1">
                        </path>
                    </svg>
                    Logout Session
                </button>
            </div>
        </aside>

        <main class="flex-grow w-full">
            <!-- REQUEST VIEW -->
            <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8 fade-in">
                <!-- Page Header -->
                <div class="mb-8 flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                    <div class="flex items-center gap-4">
                        <div
                            class="w-12 h-12 rounded-2xl bg-ecgBlue flex items-center justify-center shadow-md flex-shrink-0">
                            <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M12 4v16m8-8H4" />
                            </svg>
                        </div>
                        <div>
                            <h2 class="text-2xl font-extrabold text-gray-900 font-display tracking-tight">Request
                                Medical Attention</h2>
                            <p class="mt-0.5 text-sm text-gray-500">Submit a request for yourself or a registered
                                dependant.</p>
                        </div>
                    </div>
                    <a href="dashboard.html"
                        class="inline-flex items-center gap-2 px-4 py-2.5 text-sm font-bold text-ecgBlue bg-blue-50 rounded-xl hover:bg-blue-100 transition-colors border border-blue-100 flex-shrink-0">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                        </svg>
                        Back to Dashboard
                    </a>
                </div>

                <div class="bg-white rounded-2xl shadow-premium border border-gray-100 p-6 md:p-10 slide-up">
                    <form id="medical-form" onsubmit="handleMedicalRequest(event)" class="space-y-8">

                        <!-- Basic Info -->
                        <div class="bg-blue-50/50 p-6 rounded-xl border border-blue-100">
                            <h3
                                class="text-lg font-bold text-gray-900 mb-6 flex items-center border-b border-blue-200 pb-3 font-display">
                                <svg class="w-6 h-6 mr-2 text-ecgBlue" fill="currentColor" viewBox="0 0 20 20">
                                    <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z"
                                        clip-rule="evenodd"></path>
                                </svg>
                                Request Details
                            </h3>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div class="md:col-span-2">
                                    <label class="block text-sm font-semibold text-gray-700 mb-1">Purpose of Request
                                        *</label>
                                    <textarea id="req-purpose" required rows="3"
                                        class="input-premium block w-full bg-white border border-gray-200 rounded-lg shadow-sm py-2.5 px-4 focus:ring-2 focus:ring-ecgBlue/50 focus:border-ecgBlue sm:text-sm resize-none"></textarea>
                                </div>

                                <div>
                                    <label class="block text-sm font-semibold text-gray-700 mb-1">Hospital/Facility Name
                                        *</label>
                                    <select id="req-hospital" required
                                        class="input-premium block w-full bg-white border border-gray-200 rounded-lg shadow-sm py-2.5 px-4 focus:ring-2 focus:ring-ecgBlue/50 focus:border-ecgBlue sm:text-sm">
                                        <option value="">Select Hospital</option>
                                        <option value="DIS">DIS</option>
                                        <option value="Baiden Gartey">Baiden Gartey</option>
                                    </select>
                                </div>

                                <div>
                                    <label class="block text-sm font-semibold text-gray-700 mb-1">Date * <span
                                            class="text-xs text-gray-500 font-normal bg-gray-50 px-2 py-0.5 rounded ml-2">(Max
                                            30 days from today)</span></label>
                                    <input type="date" id="req-date" required
                                        class="input-premium block w-full bg-white border border-gray-200 rounded-lg shadow-sm py-2.5 px-4 focus:ring-2 focus:ring-ecgBlue/50 focus:border-ecgBlue sm:text-sm">
                                </div>

                                <div class="md:col-span-2 pt-4 border-t border-blue-200/50">
                                    <label class="block text-sm font-semibold text-gray-700 mb-2">Who is visiting the
                                        hospital? *</label>
                                    <select id="req-type" required onchange="toggleDependantSections()"
                                        class="input-premium block w-full bg-white border border-gray-200 rounded-lg shadow-sm py-2.5 px-4 focus:ring-2 focus:ring-ecgBlue/50 focus:border-ecgBlue sm:text-sm text-base">
                                        <option value="">Select option...</option>
                                        <option value="Self">Self (Staff)</option>
                                        <option value="Spouse">Spouse</option>
                                        <option value="Child">Dependant(s)</option>
                                    </select>
                                </div>

                                <div id="req-dependant-container"
                                    class="md:col-span-2 hidden bg-white p-4 rounded-xl shadow-sm border border-blue-100 mt-2">
                                    <label class="block text-sm font-semibold text-gray-700 mb-1"
                                        id="req-dependant-label">Select Patient</label>
                                    <select id="req-dependant" required
                                        class="input-premium block w-full bg-blue-50 border border-blue-200 rounded-lg shadow-sm py-2.5 px-4 focus:ring-2 focus:ring-ecgBlue/50 focus:border-ecgBlue sm:text-sm">
                                    </select>
                                </div>
                            </div>
                        </div>

                        <div
                            class="pt-6 flex flex-col-reverse md:flex-row md:items-center justify-end md:space-x-4 border-t border-gray-100">
                            <button type="button" onclick="window.location.href='dashboard.html'"
                                class="mt-4 md:mt-0 w-full md:w-auto px-6 py-3 border border-gray-300 rounded-xl shadow-sm text-sm font-bold text-gray-700 bg-white hover:bg-gray-50 hover:text-gray-900 focus:outline-none transition-colors">
                                Cancel
                            </button>
                            <button type="submit"
                                class="w-full md:w-auto px-8 py-3 rounded-xl shadow-md text-sm font-bold text-white bg-ecgBlue hover:bg-ecgBlueDark hover:shadow-lg hover:-translate-y-0.5 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-ecgBlue transition-all duration-200">
                                Submit Medical Request
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>
    <script type="module" src="app.js"></script>
</body>

</html>
